decisions:
  - id: D001
    topic: 前端框架选择
    decision: Vue 3 CDN，无构建步骤
    reason: 降低部署复杂度，适配 PythonAnywhere 免费层
  - id: D002
    topic: 数据隔离方案
    decision: Session ID (X-Session-Id header)，无用户登录
    reason: 免费方案，无需后端用户管理
  - id: D003
    topic: 缓存策略
    decision: SW StaleWhileRevalidate (静态资源) + NetworkFirst (API)
    reason: 先返回缓存快速加载，后台更新避免旧版本锁死
  - id: D004
    topic: 单题流模式
    decision: cursor + doneSet，默认单题模式
    reason: 参考粉笔/Anki/Quizlet，聚焦单题体验
  - id: D005
    topic: 部署方式
    decision: Files API 直接上传文件，非控制台命令
    reason: PythonAnywhere 控制台 API 需浏览器先加载，Files API 更可靠
  - id: D006
    topic: 工作流体系
    decision: SDD (Spec-Driven Development) 替代 HTML 看板
    reason: HTML 信噪比低、不可版本化、加剧上下文腐败；SDD 按需加载、可 git 追踪

