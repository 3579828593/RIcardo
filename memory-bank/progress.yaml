decisions:
  - id: D001
    topic: 前端框架选择
    decision: Vue 3 CDN，无构建步骤
  - id: D002
    topic: 数据隔离方案
    decision: Session ID (X-Session-Id header)
  - id: D003
    topic: 缓存策略
    decision: SW StaleWhileRevalidate + NetworkFirst(5s超时)
  - id: D004
    topic: 单题流模式
    decision: cursor + doneSet，默认单题模式
  - id: D005
    topic: 部署方式
    decision: Files API 直接上传文件
  - id: D006
    topic: 工作流体系
    decision: SDD (Spec-Driven Development)
  - id: D007
    topic: CSV 导入格式
    decision: 纯 CSV 格式，不支持 Excel
  - id: D008
    topic: 题目去重策略
    decision: UNIQUE(course, stem) + INSERT OR IGNORE
  - id: D009
    topic: Admin Token 安全
    decision: 从服务器文件 ~/.pa_admin_token 读取，不在代码中硬编码
    reason: 移除弱默认密码，生产环境使用32字符随机token
  - id: D010
    topic: 管理 Tab 入口
    decision: URL 参数 ?admin=1 或 localStorage 有 token 才显示
    reason: 普通学生不应看到管理入口

blockers: []

next_session_rules:
  - 新会话先读 AGENTS.md，再读此文件了解进度
  - 任何前端变更必须升级 SW 版本号
  - 部署必须包含 sw.js 和 csv_importer.py 在文件清单中
  - 测试全部通过才能提交
  - 边界条件审查：溢出、空值、引用共享
  - 开发新功能前先写 .spec/specs/<feature>.md
  - 开发完成后填 .spec/reviews/<feature>.md 自检清单
  - 测试数据使用唯一 UID 避免跨运行冲突
  - admin token 存储在 ~/.pa_admin_token，本地备份在 ~/.pa_admin_token_value

known_issues:
  - issue: PythonAnywhere 免费层冷启动 5-10 秒
    impact: 中
    workaround: NetworkFirst 5s超时 + UptimeRobot 保活
  - issue: 题目编辑 UI 未实现
    impact: 低
    workaround: 可通过 API 编辑
  - issue: CSP 允许 unsafe-eval（Vue CDN 需要）
    impact: 低
    workaround: 长期改用 Vue SFC + 构建工具
  - issue: 速率限制未实现
    impact: 中
    workaround: 后续引入 flask-limiter
  - issue: 双身份模型（session_id 与 user_id 并存）
    impact: 中
    workaround: 后续统一身份模型，session_id → user_id 迁移
  - issue: app.py 胖控制器（单文件路由过多）
    impact: 中
    workaround: 后续按 Blueprint 拆分（auth/banks/questions/admin）
  - issue: database.py 职责过载（表初始化+迁移+CRUD+查询混在一起）
    impact: 中
    workaround: 后续按 Repository 模式拆分
  - issue: backend/tests 目录不存在
    impact: 高
    workaround: 立即创建测试骨架，否则 pytest 无法运行
  - issue: pyproject.toml coverage fail_under=40 过低
    impact: 中
    workaround: 提升至 80% 并配置 pytest-cov
  - issue: 迁移异常吞问题（_pre_migrate/_post_migrate except:pass）
    impact: 中
    workaround: 立即修复，记录日志 + 重新抛出
