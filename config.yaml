server:
  host: "127.0.0.1"
  port: 5000
  debug: false

storage:
  db_path: "data/quiz.db"
  backup_dir: "data/backups"
  export_json_path: "data/questions.json"

quiz:
  default_page_size: 20
  max_page_size: 100
  shuffle: false
  time_limit_minutes: 0

security:
  admin_enabled: true
  admin_token_env: "QUIZ_ADMIN_TOKEN"
  secret_key_env: "SECRET_KEY"
  rate_limit_per_minute: 60

logging:
  level: "INFO"
  file: "logs/app.log"
  max_bytes: 10485760
  backup_count: 5
