# CI/CD Pipeline - Auto-run tests on push and PR
# Triggers: push to main, pull_request to main
# Checks: pytest (excluding e2e) + quality gate

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      QUIZ_ADMIN_TOKEN: ci-test-admin-token

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask==3.0.3 werkzeug==3.0.3 pyyaml==6.0.1 pytest

      - name: Run pytest
        working-directory: .
        run: |
          python -m pytest backend/tests -v --tb=short -q --ignore=backend/tests/e2e

      - name: Run quality gate
        working-directory: .
        run: |
          python scripts/quality_gate.py
